<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Verify Email - BorrowIT</title>
  <link rel="stylesheet" href="/shared/css/official-theme.css">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body data-page="verify-email">
  <a href="#main-content" class="skip-to-content">Skip to main content</a>
  <main class="auth-page compact-auth" id="main-content">
    <section class="auth-panel">
      <a class="portal-brand auth-brand" href="/login.html">
        <span class="brand-mark">BI</span>
        <span><strong>BorrowIT</strong><small>User Portal</small></span>
      </a>
      <div class="auth-copy">
        <p class="eyebrow">Email Verification</p>
        <h1>Activate Account</h1>
        <p>User registration requires email verification when the modern schema is installed.</p>
      </div>
    </section>

    <section class="auth-card">
      <h2>Verification Token</h2>
      <div id="verify-feedback" class="status-message" role="alert" aria-live="polite"></div>
      <form id="verify-email-form" class="form-grid">
        <label>Token<input name="token" type="text" required></label>
        <button type="submit">Verify Email</button>
      </form>
      <div class="auth-links">
        <a href="/login.html">Back to login</a>
      </div>
    </section>
  </main>
  <script src="/js/app.js"></script>
</body>
</html>
