<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Equipment Management - BorrowIT Admin</title>
  <link rel="stylesheet" href="/shared/css/official-theme.css">
  <link rel="stylesheet" href="/shared/css/admin-styles.css">
</head>
<body data-page="admin-equipment">
  <header class="site-header admin-header">
    <div class="brand">BorrowIT Admin</div>
    <nav class="admin-nav">
      <a href="/admin/dashboard.html">Dashboard</a>
      <a href="/admin/equipment-management.html">Equipment</a>
      <a href="/admin/borrower-management.html">Users</a>
      <a href="/admin/approvals.html">Approvals</a>
      <a href="/admin/reports.html">Reports</a>
    </nav>
    <button id="profile-button" class="profile-button" aria-label="View profile"></button>
  </header>

  <main class="admin-page-content">
    <section class="admin-card">
      <h1>Equipment Inventory</h1>
      <div class="admin-section-row">
        <form id="equipment-form" class="admin-form-card">
          <h2>Add Equipment Item</h2>
          <label>Name<input name="name" required></label>
          <label>Asset Tag<input name="assetTag" required></label>
          <label>Category<input name="category" required></label>
          <label>Description<textarea name="description"></textarea></label>
          <label>Total Quantity<input name="totalQuantity" type="number" min="1" required></label>
          <label>Status<select name="status"><option value="AVAILABLE">AVAILABLE</option><option value="UNAVAILABLE">UNAVAILABLE</option><option value="MAINTENANCE">MAINTENANCE</option></select></label>
          <button type="submit">Create Equipment</button>
          <div id="equipment-feedback" class="status-message"></div>
        </form>
      </div>
      <div id="equipment-list" class="admin-table-container">Loading equipment list...</div>
    </section>
  </main>

  <script src="/js/app.js"></script>
  <script src="/shared/js/admin-app.js"></script>
</body>
</html>
