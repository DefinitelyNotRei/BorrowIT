<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reports - BorrowIT Admin</title>
  <link rel="stylesheet" href="/shared/css/official-theme.css">
  <link rel="stylesheet" href="/shared/css/admin-styles.css">
</head>
<body data-page="admin-reports">
  <header class="site-header admin-header">
    <div class="brand">BorrowIT Admin</div>
    <nav class="admin-nav">
      <a href="/admin/dashboard.html">Dashboard</a>
      <a href="/admin/equipment-management.html">Equipment</a>
      <a href="/admin/borrower-management.html">Users</a>
      <a href="/admin/approvals.html">Approvals</a>

    <button id="profile-button" class="profile-button" aria-label="View profile"></button>

  <main class="admin-page-content">
    <section class="admin-card">
      <h1>Reports</h1>
      <p>Review current borrowing trends and overdue status across the inventory.</p>
      <div class="report-grid">
        <article><h2>Active Requests</h2><p id="report-active">Loading...</p></article>

        <article><h2>Overdue Items</h2><p id="report-overdue">Loading...</p></article>
      </div>
    </section>
  </main>

  <script src="/js/app.js"></script>
  <script src="/shared/js/admin-app.js"></script>
