<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Dashboard - BorrowIT</title>
  <link rel="stylesheet" href="/shared/css/official-theme.css">
  <link rel="stylesheet" href="/shared/css/admin-styles.css">
</head>
<body data-page="admin-dashboard">
  <header class="site-header admin-header">
    <div class="brand">BorrowIT Admin</div>
    <nav class="admin-nav">
      <a href="/admin/dashboard.html">Dashboard</a>
      <a href="/admin/equipment-management.html">Equipment</a>
      <a href="/admin/borrower-management.html">Users</a>
      <a href="/admin/approvals.html">Approvals</a>
      <a href="/admin/reports.html">Reports</a>
    </nav>
    <button id="profile-button" class="profile-button" aria-label="View profile"></button>
  </header>

  <main class="admin-page-content">
    <section class="admin-card summary-grid">
      <article>
        <h2>Inventory Items</h2>
        <p id="summary-equipment-count">Loading...</p>
      </article>
      <article>
        <h2>Pending Requests</h2>
        <p id="summary-pending-count">Loading...</p>
      </article>
      <article>
        <h2>Active Borrowings</h2>
        <p id="summary-active-count">Loading...</p>
      </article>
      <article>
        <h2>Overdue Items</h2>
        <p id="summary-overdue-count">Loading...</p>
      </article>
    </section>

    <section class="admin-card">
      <h1>Recent Approvals</h1>
      <div id="recent-approvals" class="admin-table-container">Loading approvals...</div>
    </section>
  </main>

  <script src="/js/app.js"></script>
  <script src="/shared/js/admin-app.js"></script>
</body>
</html>
