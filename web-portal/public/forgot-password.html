<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forgot Password - BorrowIT</title>
  <link rel="stylesheet" href="/shared/css/official-theme.css">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body data-page="forgot-password">
  <a href="#main-content" class="skip-to-content">Skip to main content</a>
  <main class="auth-page compact-auth" id="main-content">
    <section class="auth-panel">
      <a class="portal-brand auth-brand" href="/login.html">
        <span class="brand-mark">BI</span>
        <span><strong>BorrowIT</strong><small>User Portal</small></span>
      </a>
      <div class="auth-copy">
        <p class="eyebrow">Account Recovery</p>
        <h1>Password Reset</h1>
        <p>Reset links expire after 30 minutes.</p>
      </div>
    </section>

    <section class="auth-card">
      <h2>Reset Request</h2>
      <div id="forgot-feedback" class="status-message" role="alert" aria-live="polite"></div>
      <form id="forgot-password-form" class="form-grid">
        <label>Email<input name="email" type="email" required autocomplete="email"></label>
        <button type="submit">Send Reset Link</button>
      </form>
      <div class="auth-links">
        <a href="/reset-password.html">Enter reset token</a>
        <a href="/login.html">Back to login</a>
      </div>
    </section>
  </main>
  <script src="/js/app.js"></script>
</body>
</html>
