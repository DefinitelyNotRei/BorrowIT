<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Available Equipment - BorrowIT</title>
  <link rel="stylesheet" href="/shared/css/official-theme.css">
  <link rel="stylesheet" href="/shared/css/admin-styles.css">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body data-page="equipment">
  <a href="#main-content" class="skip-to-content">Skip to main content</a>
  <header class="site-header admin-header">
    <div class="brand">BorrowIT</div>
    <nav class="admin-nav">
      <a href="/equipment.html">Available Equipment</a>
      <a href="/pending-requests.html">Pending Requests</a>
      <a href="/current-loans.html">Current Borrowings</a>
      <a href="/history.html">Reservations and History</a>
      <a href="/account.html">Account</a>
    </nav>
    <button id="profile-button" class="profile-button" aria-label="View profile"></button>
  </header>

  <main class="admin-page-content" id="main-content">
    <section class="admin-card">
      <h1>Available Equipment</h1>
      <p>Search available equipment and submit reservation requests for pickup.</p>
      <div class="search-filters">
        <div class="filter-group">
          <label for="search-input">Search</label>
          <input type="text" id="search-input" placeholder="Search by name, tag, or description" aria-label="Search equipment">
        </div>
        <div class="filter-group">
          <label for="category-filter">Category</label>
          <select id="category-filter" aria-label="Filter by category">
            <option value="">All Categories</option>
            <option value="Sports">Sports</option>
            <option value="Electronics">Electronics</option>
            <option value="Laboratory">Laboratory</option>
            <option value="Office">Office</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <button id="search-button" aria-label="Apply filters">Search</button>
        <button id="clear-filters" aria-label="Clear filters">Clear</button>
      </div>
    </section>

    <section id="equipment-list" class="admin-card grid-list"></section>
  </main>
  <script src="/js/app.js"></script>
</body>
</html>
