<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password - BorrowIT</title>
  <link rel="stylesheet" href="/shared/css/official-theme.css">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body data-page="reset-password">
  <a href="#main-content" class="skip-to-content">Skip to main content</a>
  <main class="auth-page compact-auth" id="main-content">
    <section class="auth-panel">
      <a class="portal-brand auth-brand" href="/login.html">
        <span class="brand-mark">BI</span>
        <span><strong>BorrowIT</strong><small>User Portal</small></span>
      </a>
      <div class="auth-copy">
        <p class="eyebrow">Account Recovery</p>
        <h1>New Password</h1>
        <p>Use the reset token from the recovery email.</p>
      </div>
    </section>

    <section class="auth-card">
      <h2>Reset Password</h2>
      <div id="reset-feedback" class="status-message" role="alert" aria-live="polite"></div>
      <form id="reset-password-form" class="form-grid">
        <label>Reset Token<input name="token" type="text" required></label>
        <label>New Password<input name="newPassword" type="password" required autocomplete="new-password"></label>
        <button type="submit">Update Password</button>
      </form>
      <div class="auth-links">
        <a href="/forgot-password.html">Request new token</a>
        <a href="/login.html">Back to login</a>
      </div>
    </section>
  </main>
  <script src="/js/app.js"></script>
</body>
</html>
