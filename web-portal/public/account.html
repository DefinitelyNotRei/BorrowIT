<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Account - BorrowIT</title>
  <link rel="stylesheet" href="/shared/css/official-theme.css">
  <link rel="stylesheet" href="/shared/css/admin-styles.css">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body data-page="account">
  <header class="site-header admin-header">
    <div class="brand">BorrowIT</div>
    <nav class="admin-nav">
      <a href="/equipment.html">Available Equipment</a>
      <a href="/pending-requests.html">Pending Requests</a>
      <a href="/current-loans.html">Current Borrowings</a>
      <a href="/history.html">Reservations and History</a>
      <a href="/account.html">Account</a>
    </nav>
    <button id="profile-button" class="profile-button" aria-label="View profile"></button>
  </header>

  <main class="admin-page-content">
    <section class="admin-card form-card">
      <h1>Account Settings</h1>
      <div id="account-feedback" class="status-message"></div>
      <div id="user-info"></div>
      <form id="change-password-form">
        <label>Current Password<input name="currentPassword" type="password" required></label>
        <label>New Password<input name="newPassword" type="password" required></label>
        <button type="submit">Change Password</button>
      </form>
      <button id="logout-account-button" class="secondary-button">Logout</button>
    </section>
  </main>
  <script src="/js/app.js"></script>
</body>
</html>
