<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin - Create User Account</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body data-page="admin">
  <header class="site-header">
    <div class="brand">BorrowIT</div>
    <nav>
      <a href="/admin.html">Create User</a>
      <a href="/account.html">Account</a>
      <a id="logout-link" href="#">Logout</a>
    </nav>
  </header>

  <main class="page-container">
    <section class="form-card">
      <h1>Create User Account</h1>
      <p>This page is available only to admins. New user accounts must be created by an admin.</p>
      <div id="admin-feedback" class="status-message"></div>
      <form id="create-user-form">
        <fieldset>
          <legend>User Details</legend>
          <label>First Name
            <input name="firstName" type="text" required>
          </label>
          <label>Middle Name
            <input name="middleName" type="text">
          </label>
          <label>Last Name
            <input name="lastName" type="text" required>
          </label>
          <label>Suffix
            <input name="suffix" type="text">
          </label>
          <label>User ID
            <input name="userId" type="text" inputmode="numeric" pattern="[0-9]*" required>
          </label>
          <label>Phone Number
            <input name="phoneNumber" type="text" inputmode="numeric" pattern="[0-9]*" required>
          </label>
          <label>Department
            <input name="department" type="text" required>
          </label>
          <label>Course
            <input name="course" type="text" required>
          </label>
          <label>Year Level
            <input name="yearLevel" type="number" min="1" required>
          </label>
          <label>Block
            <input name="block" type="text" required>
          </label>
          <label>Password
            <input name="password" type="password" required>
          </label>
        </fieldset>
        <button type="submit">Create User Account</button>
      </form>
    </section>
  </main>
  <script src="/js/app.js"></script>
</body>
</html>
